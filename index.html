<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:       #F95F18;
    --orange-dark:  #C43C00;
    --orange-light: #FDE8DC;
    --yellow:       #FFB600;
    --yellow-light: #FFF3CC;
    --purple:       #7600C0;
    --purple-light: #EDE0F8;
    --brown:        #611F00;
    --brown-dark:   #411A11;
    --warm-white:   #FEF5E6;
    --warm-white-dk:#F7E0BA;
    --bg:           var(--warm-white);
    --card:         #FFFFFF;
    --text:         var(--brown-dark);
    --text-2:       #7A4020;
    --text-3:       #A0613A;
    --border:       rgba(97,31,0,0.1);
    --border-strong:rgba(97,31,0,0.2);
    --display: 'Inclusive Sans', Arial, sans-serif;
    --body:    'Inclusive Sans', Arial, sans-serif;
    --radius:    16px;
    --radius-sm: 10px;
    --radius-xs: 8px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--body);
    background: var(--warm-white);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HERO ── */
  .hero {
    width: 100%;
    background: linear-gradient(180deg, var(--orange) 0%, #F97B18 35%, var(--yellow) 100%);
    padding: 56px 24px 88px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: 'e';
    position: absolute;
    right: -30px;
    top: -30px;
    font-size: 300px;
    font-family: var(--display);
    font-weight: 700;
    color: rgba(255,255,255,0.07);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }
  .hero-logo {
    display: inline-block;
    font-family: var(--body);
    font-size: 14px;
    letter-spacing: 0.08em;
    color: var(--brown);
    background: var(--warm-white);
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 32px;
  }
  .hero h1 {
    font-family: var(--display);
    font-size: clamp(30px, 5vw, 50px);
    font-weight: 700;
    line-height: 1.15;
    max-width: 640px;
    margin: 0 auto 20px;
    color: var(--brown);
  }
  .hero h1 em { font-style: italic; color: #fff; }
  .hero-sub {
    font-size: 16px;
    color: var(--brown);
    max-width: 480px;
    margin: 0 auto 36px;
    line-height: 1.7;
    opacity: 0.85;
  }
  .hero-badges { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--brown);
    background: rgba(255,255,255,0.35);
    padding: 5px 12px;
    border-radius: 20px;
  }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--brown); flex-shrink: 0; }

  /* ── WRAPPER ── */
  .assessment-wrap {
    width: 100%;
    max-width: 660px;
    padding: 0 20px 80px;
    margin-top: -40px;
    position: relative;
    z-index: 2;
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 40px;
    box-shadow: 0 8px 40px rgba(97,31,0,0.1), 0 1px 4px rgba(97,31,0,0.06);
  }

  /* ── PROGRESS ── */
  .progress-wrap { margin-bottom: 36px; }
  .progress-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
  .progress-track { height: 3px; background: var(--warm-white-dk); border-radius: 2px; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--yellow));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── TYPE ── */
  .step-kicker { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
  .step-title { font-family: var(--display); font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; color: var(--brown); }
  .step-sub { font-size: 15px; color: var(--text-2); line-height: 1.65; margin-bottom: 32px; }

  /* ── OPTIONS ── */
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .opt {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    background: var(--warm-white);
    user-select: none;
  }
  .opt:hover { border-color: var(--orange); background: var(--orange-light); transform: translateY(-1px); }
  .opt.selected { border-color: var(--orange); border-width: 2px; background: var(--orange-light); }
  .opt-icon { font-size: 22px; margin-bottom: 8px; }
  .opt-label { font-size: 14px; color: var(--brown); }
  .opt-desc { font-size: 12px; color: var(--text-3); margin-top: 3px; }

  /* ── INPUTS ── */
  .input-group { margin-bottom: 24px; }
  .input-label { font-size: 13px; color: var(--brown); margin-bottom: 6px; display: block; }
  .input-hint { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
  input[type="number"] {
    width: 100%;
    padding: 12px 16px;
    font-size: 16px;
    font-family: var(--body);
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--warm-white);
    color: var(--brown);
    transition: border-color 0.15s, box-shadow 0.15s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,95,24,0.12); }

  /* ── SLIDER ── */
  .slider-group { margin-bottom: 28px; }
  .slider-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .slider-val { font-family: var(--display); font-size: 24px; font-weight: 700; color: var(--orange); }
  input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: linear-gradient(to right, var(--orange) 0%, var(--orange) var(--pct, 40%), var(--warm-white-dk) var(--pct, 40%), var(--warm-white-dk) 100%);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    margin: 8px 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--orange);
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(249,95,24,0.35);
    cursor: grab;
    transition: transform 0.1s;
  }
  input[type="range"]:active::-webkit-slider-thumb { transform: scale(1.2); cursor: grabbing; }
  .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%;
    padding: 15px 24px;
    background: var(--orange);
    color: var(--warm-white);
    font-family: var(--body);
    font-size: 15px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-primary:hover:not(:disabled) { background: var(--orange-dark); transform: translateY(-1px); }
  .btn-primary:active:not(:disabled) { transform: translateY(0); }
  .btn-primary:disabled { background: var(--warm-white-dk); color: var(--text-3); cursor: not-allowed; }
  .btn-back {
    background: none; border: none; font-family: var(--body); font-size: 13px;
    color: var(--text-3); cursor: pointer; padding: 0 0 24px;
    display: flex; align-items: center; gap: 6px; transition: color 0.15s;
  }
  .btn-back:hover { color: var(--brown); }

  /* ── INSIGHT ── */
  .insight {
    background: var(--yellow-light);
    border-left: 3px solid var(--yellow);
    border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
    padding: 12px 16px;
    margin-bottom: 28px;
    font-size: 13px;
    color: var(--brown);
    line-height: 1.6;
  }

  /* ── RESULT ── */
  .result-hero { text-align: center; padding-bottom: 32px; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
  .result-eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; }
  .result-amount { font-family: var(--display); font-size: clamp(44px, 8vw, 64px); font-weight: 700; color: var(--orange); line-height: 1; margin-bottom: 8px; }
  .result-caption { font-size: 14px; color: var(--text-2); }

  .metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .metric { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 12px; text-align: center; }
  .metric-val { font-size: 17px; color: var(--brown); }
  .metric-lbl { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .metric-dot { width: 6px; height: 6px; border-radius: 50%; margin: 8px auto 0; }

  .bars-section { margin-bottom: 28px; }
  .bars-title { font-size: 13px; color: var(--text-2); margin-bottom: 14px; }
  .bar-item { margin-bottom: 12px; }
  .bar-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-2); margin-bottom: 5px; }
  .bar-track { height: 6px; background: var(--warm-white-dk); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }

  .profile-card { border-radius: var(--radius-sm); padding: 20px; margin-bottom: 28px; }
  .profile-tag { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; border: 1px solid transparent; }
  .profile-text { font-size: 14px; color: var(--brown); line-height: 1.7; }

  /* ── EMAIL ── */
  .email-section { background: var(--brown); border-radius: var(--radius-sm); padding: 28px; }
  .email-title { font-family: var(--display); font-size: 22px; font-weight: 700; color: var(--warm-white); margin-bottom: 6px; }
  .email-desc { font-size: 13px; color: rgba(254,245,230,0.7); margin-bottom: 20px; line-height: 1.6; }
  .email-row { display: flex; gap: 8px; }
  .email-row input {
    flex: 1; padding: 12px 16px; font-size: 14px; font-family: var(--body);
    border: 1.5px solid rgba(254,245,230,0.2);
    border-radius: var(--radius-xs);
    background: rgba(254,245,230,0.08);
    color: var(--warm-white);
    transition: border-color 0.15s;
  }
  .email-row input::placeholder { color: rgba(254,245,230,0.4); }
  .email-row input:focus { outline: none; border-color: var(--yellow); }
  .email-row input.error { border-color: #FF6B6B; }
  .btn-send {
    padding: 12px 22px; background: var(--orange); color: var(--warm-white);
    font-family: var(--body); font-size: 14px; border: none;
    border-radius: var(--radius-xs); cursor: pointer; white-space: nowrap;
    transition: background 0.15s; flex-shrink: 0;
  }
  .btn-send:hover { background: var(--orange-dark); }
  .btn-send:disabled { background: rgba(249,95,24,0.4); cursor: wait; }
  .privacy-note { font-size: 11px; color: rgba(254,245,230,0.4); margin-top: 12px; }

  /* ── SUCCESS ── */
  .success-wrap { text-align: center; padding: 8px 0; }
  .check-circle {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--orange), var(--yellow));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .success-title { font-family: var(--display); font-size: 28px; font-weight: 700; color: var(--brown); margin-bottom: 10px; }
  .success-sub { font-size: 15px; color: var(--text-2); line-height: 1.7; margin-bottom: 28px; }
  .what-inside { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 20px; text-align: left; margin-bottom: 20px; }
  .what-inside-title { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }
  .what-item { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text-2); margin-bottom: 10px; line-height: 1.5; }
  .what-arrow { color: var(--orange); flex-shrink: 0; }
  .btn-cta-secondary {
    width: 100%; padding: 14px; background: transparent; color: var(--brown);
    font-family: var(--body); font-size: 14px;
    border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
  }
  .btn-cta-secondary:hover { background: var(--orange-light); border-color: var(--orange); }

  /* ── FOOTER ── */
  .disclaimer { font-size: 11px; color: var(--text-3); text-align: center; margin-top: 20px; line-height: 1.6; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .options-grid { grid-template-columns: 1fr; }
    .metrics-row { grid-template-columns: 1fr; }
    .hero { padding: 48px 20px 80px; }
    .email-row { flex-direction: column; }
    .btn-send { width: 100%; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-logo">epassi · welfare assessment</div>
  <h1>Quanto costa il <em>caregiving</em><br>alla tua azienda?</h1>
  <p class="hero-sub">In Italia, 1 dipendente su 3 si prende cura di un familiare. Calcola l'impatto economico nascosto in meno di 2 minuti.</p>
  <div class="hero-badges">
    <span class="badge"><span class="badge-dot"></span>Dati INPS, ISTAT, Gallup</span>
    <span class="badge"><span class="badge-dot"></span>Nessun dato sensibile</span>
    <span class="badge"><span class="badge-dot"></span>Risultato immediato</span>
  </div>
</div>

<div class="assessment-wrap">
  <div class="card" id="card"></div>
  <p class="disclaimer" id="disclaimer"></p>
</div>

<script>
const S = {
  step: 0, sector: null, size: null,
  employees: null, avgSalary: 32000, pctCaregiver: 33
};

const sectors = [
  { id:'health',   icon:'🏥', label:'Sanità e sociale',        desc:'ospedali, RSA, cooperative' },
  { id:'industry', icon:'🏭', label:'Industria e manifattura',  desc:'produzione, logistica' },
  { id:'services', icon:'💼', label:'Servizi professionali',    desc:'consulenza, tech, finanza' },
  { id:'retail',   icon:'🛒', label:'Commercio e retail',       desc:'GDO, distribuzione' },
  { id:'pa',       icon:'🏛️', label:'Pubblica amministrazione', desc:'enti, comuni, scuole' },
  { id:'other',    icon:'📋', label:'Altro settore',            desc:'' }
];
const sizes = [
  { id:'small',      label:'10–50 dipendenti', desc:'piccola impresa' },
  { id:'medium',     label:'51–200',            desc:'media impresa' },
  { id:'large',      label:'201–500',           desc:'grande impresa' },
  { id:'enterprise', label:'Oltre 500',         desc:'gruppo / multinazionale' }
];
const sectorMult  = { health:1.25, industry:1.0, services:0.9, retail:1.1, pa:1.15, other:1.0 };
const sizeMult    = { small:1.1, medium:1.0, large:0.95, enterprise:0.9 };
const sizeDefault = { small:30, medium:120, large:350, enterprise:700 };
const insights = {
  health:   'Nei settori socio-sanitari la quota di caregiver supera il 38% (ISTAT).',
  industry: "In manifattura, l'assenteismo da caregiving pesa mediamente 9,1 giorni per dipendente coinvolto.",
  services: 'Nei servizi professionali, il caregiving silenzioso riduce la produttività del 9% (Gallup).',
  retail:   'Nel commercio, il turnover legato al caregiving è tra i più alti: +12% rispetto alla media.',
  pa:       'Nella PA, il 41% dei dipendenti è anche caregiver — il dato più alto per settore (INPS).',
  other:    'La media nazionale: 1 dipendente su 3 è caregiver attivo (ISTAT 2023).'
};

function fmt(n) { return Math.round(n).toLocaleString('it-IT'); }

function calc() {
  const emp = parseInt(S.employees)||0, sal = parseInt(S.avgSalary)||0,
        pct = parseInt(S.pctCaregiver)||33,
        sm  = sectorMult[S.sector]||1, szm = sizeMult[S.size]||1;
  const cg       = Math.round(emp * pct / 100);
  const absCost  = Math.round(cg * 8.3 * (sal/220) * sm);
  const prodCost = Math.round(cg * sal * 0.07 * sm * szm);
  const turnCost = Math.round(cg * 0.06 * sal * 0.8 * sm);
  const total    = absCost + prodCost + turnCost;
  const risk     = Math.min(100, Math.round((pct/33*40)+(sm*30)+(emp>200?30:emp>50?20:10)));
  return { cg, absCost, prodCost, turnCost, total, risk };
}

function profile(r) {
  if (r.risk >= 75) return { tag:'Rischio elevato',  bg:'rgba(249,95,24,0.1)',  tc:'#C43C00', text:`Con ${r.cg} caregiver stimati, la tua organizzazione è esposta a un impatto rilevante. Il costo nascosto del caregiving incide sull'assenteismo, sulla programmazione e sul clima. Un programma strutturato di welfare può ridurre questo costo fino al 40%.` };
  if (r.risk >= 50) return { tag:'Rischio moderato', bg:'rgba(255,182,0,0.12)', tc:'#7A5500', text:`La tua azienda presenta un'esposizione nella media di settore. Ci sono margini di miglioramento concreti attraverso flessibilità organizzativa e supporto ai caregiver. Intervenire ora previene l'escalation del fenomeno.` };
  return              { tag:'Rischio contenuto', bg:'rgba(118,0,192,0.08)', tc:'#5A0090', text:`Il profilo mostra un'esposizione sotto la media. Tuttavia, il caregiving silenzioso si manifesta nei dati con 12–18 mesi di ritardo. Un assessment approfondito permette di anticipare il fenomeno prima che diventi critico.` };
}

function render() {
  const card = document.getElementById('card');
  const disc = document.getElementById('disclaimer');
  disc.textContent = '';

  const progPct  = [0,33,66,100,100,100][S.step]||0;
  const stepLabel = S.step < 3 ? `Step ${S.step+1} di 3` : '';
  const progressHTML = S.step < 4 ? `
    <div class="progress-wrap">
      <div class="progress-top"><span>${stepLabel}</span><span>${progPct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${progPct}%"></div></div>
    </div>` : '';

  if (S.step === 0) {
    card.innerHTML = progressHTML + `
      <div class="step-kicker">Contesto aziendale</div>
      <div class="step-title">In quale settore opera<br>la tua azienda?</div>
      <div class="step-sub">Il contesto di settore influenza significativamente l'incidenza del caregiving tra i dipendenti.</div>
      <div class="options-grid">
        ${sectors.map(s=>`
          <div class="opt${S.sector===s.id?' selected':''}" data-id="${s.id}" onclick="pick('sector','${s.id}')">
            <div class="opt-icon">${s.icon}</div>
            <div class="opt-label">${s.label}</div>
            ${s.desc?`<div class="opt-desc">${s.desc}</div>`:''}
          </div>`).join('')}
      </div>
      <button class="btn-primary" id="btn-next" onclick="nextStep()" ${!S.sector?'disabled':''}>Continua →</button>`;
  }
  else if (S.step === 1) {
    card.innerHTML = progressHTML + `
      <button class="btn-back" onclick="prevStep()">← Indietro</button>
      <div class="step-kicker">Struttura organizzativa</div>
      <div class="step-title">Quanti dipendenti ha<br>la tua organizzazione?</div>
      <div class="step-sub">La dimensione aziendale determina la scala dell'impatto e le leve di intervento disponibili.</div>
      <div class="options-grid" style="grid-template-columns:1fr 1fr">
        ${sizes.map(s=>`
          <div class="opt${S.size===s.id?' selected':''}" data-id="${s.id}" onclick="pick('size','${s.id}')">
            <div class="opt-label">${s.label}</div>
            <div class="opt-desc">${s.desc}</div>
          </div>`).join('')}
      </div>
      <div class="insight">${insights[S.sector]||''}</div>
      <button class="btn-primary" id="btn-next" onclick="nextStep()" ${!S.size?'disabled':''}>Continua →</button>`;
  }
  else if (S.step === 2) {
    if (!S.employees && S.size) S.employees = sizeDefault[S.size];
    const pct = parseInt(S.pctCaregiver)||33;
    const pctFill = ((pct-15)/(60-15)*100).toFixed(1);
    card.innerHTML = progressHTML + `
      <button class="btn-back" onclick="prevStep()">← Indietro</button>
      <div class="step-kicker">Dati per il calcolo</div>
      <div class="step-title">Tre numeri per stimare<br>il tuo impatto</div>
      <div class="step-sub">Nessun dato sensibile — bastano stime di massima per ottenere un risultato significativo.</div>
      <div class="input-group">
        <label class="input-label">Numero di dipendenti</label>
        <div class="input-hint">Un'approssimazione è più che sufficiente</div>
        <input type="number" value="${S.employees}" min="5" max="50000" oninput="S.employees=this.value" />
      </div>
      <div class="input-group">
        <label class="input-label">RAL media annua (€)</label>
        <div class="input-hint">Puoi usare il dato medio di settore o un valore indicativo</div>
        <input type="number" value="${S.avgSalary}" min="15000" max="120000" step="500" oninput="S.avgSalary=this.value" />
      </div>
      <div class="slider-group">
        <div class="slider-top">
          <label class="input-label" style="margin:0">Stima caregiver in azienda</label>
          <span class="slider-val" id="pct-display">${pct}%</span>
        </div>
        <div class="input-hint">In Italia la media è 33%. Nei settori femminilizzati può superare il 45%.</div>
        <input type="range" min="15" max="60" step="1" value="${pct}" style="--pct:${pctFill}%"
          oninput="S.pctCaregiver=this.value;document.getElementById('pct-display').textContent=this.value+'%';this.style.setProperty('--pct',((this.value-15)/45*100).toFixed(1)+'%')" />
        <div class="slider-labels"><span>15% — bassa incidenza</span><span>60% — alta incidenza</span></div>
      </div>
      <button class="btn-primary" onclick="showResult()">Calcola il mio impatto →</button>`;
  }
  else if (S.step === 3) {
    const r = calc(), p = profile(r);
    const absP = Math.round(r.absCost/r.total*100), prodP = Math.round(r.prodCost/r.total*100), turnP = 100-absP-prodP;
    card.innerHTML = `
      <div class="result-hero">
        <div class="result-eyebrow">Costo stimato del caregiving nella tua azienda</div>
        <div class="result-amount">€ ${fmt(r.total)}</div>
        <div class="result-caption">ogni anno — costi nascosti sotto la superficie</div>
      </div>
      <div class="metrics-row">
        <div class="metric"><div class="metric-val">€ ${fmt(r.absCost)}</div><div class="metric-lbl">Assenteismo</div><div class="metric-dot" style="background:#F95F18"></div></div>
        <div class="metric"><div class="metric-val">€ ${fmt(r.prodCost)}</div><div class="metric-lbl">Produttività</div><div class="metric-dot" style="background:#FFB600"></div></div>
        <div class="metric"><div class="metric-val">€ ${fmt(r.turnCost)}</div><div class="metric-lbl">Turnover</div><div class="metric-dot" style="background:#7600C0"></div></div>
      </div>
      <div class="bars-section">
        <div class="bars-title">Distribuzione dell'impatto</div>
        <div class="bar-item"><div class="bar-row"><span>Assenteismo</span><span>${absP}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${absP}%;background:#F95F18"></div></div></div>
        <div class="bar-item"><div class="bar-row"><span>Perdita di produttività</span><span>${prodP}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${prodP}%;background:#FFB600"></div></div></div>
        <div class="bar-item"><div class="bar-row"><span>Turnover silenzioso</span><span>${turnP}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${turnP}%;background:#7600C0"></div></div></div>
      </div>
      <div class="profile-card" style="background:${p.bg};border:1px solid ${p.tc}22">
        <span class="profile-tag" style="background:${p.bg};color:${p.tc};border-color:${p.tc}44">${p.tag}</span>
        <div class="profile-text">${p.text}</div>
      </div>
      <div class="email-section">
        <div class="email-title">Ricevi il report completo</div>
        <div class="email-desc">Benchmark di settore e raccomandazioni operative personalizzate direttamente nel tuo inbox.</div>
        <div class="email-row">
          <input type="email" id="email-inp" placeholder="la-tua@email.it" />
          <button class="btn-send" onclick="sendEmail()">Invia →</button>
        </div>
        <div class="privacy-note">Nessuno spam. Dati trattati ai sensi del GDPR. Cancellazione in qualsiasi momento.</div>
      </div>`;
    disc.textContent = 'Stime basate su dati INPS, ISTAT e Gallup 2023–2024. I risultati sono indicativi e variano in base al contesto aziendale specifico.';
  }
  else if (S.step === 4) {
    const r = calc();
    card.innerHTML = `
      <div class="success-wrap">
        <div class="check-circle">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FEF5E6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="success-title">Report in arrivo</div>
        <p class="success-sub">Troverai nella tua casella il report completo con l'analisi del costo stimato di <strong>€ ${fmt(r.total)}</strong> e le raccomandazioni personalizzate per la tua organizzazione.</p>
        <div class="what-inside">
          <div class="what-inside-title">Nel report troverai</div>
          <div class="what-item"><span class="what-arrow">→</span><span>Benchmark dettagliato del tuo settore</span></div>
          <div class="what-item"><span class="what-arrow">→</span><span>Piano d'azione in 3 fasi con priorità operative</span></div>
          <div class="what-item"><span class="what-arrow">→</span><span>ROI stimato di un programma welfare caregiving</span></div>
          <div class="what-item"><span class="what-arrow">→</span><span>Case history di aziende con profilo simile al tuo</span></div>
        </div>
        <button class="btn-cta-secondary" onclick="window.open('https://www.epassi.it/it/contatti','_blank')">Parla con un consulente Epassi →</button>
      </div>`;
  }
}

function pick(field, val) {
  S[field] = val;
  document.querySelectorAll('.opt').forEach(el => el.classList.toggle('selected', el.dataset.id === val));
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = false;
}

function nextStep()  { S.step++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function prevStep()  { S.step--; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function showResult(){ S.step=3;  render(); window.scrollTo({top:0,behavior:'smooth'}); }

/* ─── HUBSPOT INTEGRATION ───────────────────────────────────────────────────
   Istruzioni per il team Epassi:
   1. Creare un form in HubSpot (anche hidden/non pubblicato va bene)
   2. Aggiungere le 8 proprietà custom elencate sotto (Settings → Properties)
   3. Sostituire HS_PORTAL_ID e HS_FORM_GUID con i valori reali

   Proprietà custom da creare sul contatto:
   - caregiving_settore         (Single-line text)
   - caregiving_dimensione      (Single-line text)
   - caregiving_dipendenti      (Number)
   - caregiving_ral_media       (Number)
   - caregiving_pct_caregiver   (Number)
   - caregiving_costo_stimato   (Number)
   - caregiving_profilo_rischio (Single-line text)
   - caregiving_fonte           (Single-line text) ← 'newsletter' o 'sito'
────────────────────────────────────────────────────────────────────────── */
const HS_PORTAL_ID = 'XXXXXXXX';
const HS_FORM_GUID = 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx';

async function sendEmail() {
  const inp = document.getElementById('email-inp');
  const val = inp.value.trim();
  if (!val || !val.includes('@') || !val.includes('.')) { inp.classList.add('error'); inp.focus(); return; }
  inp.classList.remove('error');
  S.email = val;
  const btn = document.querySelector('.btn-send');
  if (btn) { btn.disabled = true; btn.textContent = 'Invio...'; }

  const r = calc(), p = profile(r);
  const payload = {
    fields: [
      { name:'email',                      value: val },
      { name:'caregiving_settore',         value: S.sector||'' },
      { name:'caregiving_dimensione',      value: S.size||'' },
      { name:'caregiving_dipendenti',      value: String(parseInt(S.employees)||0) },
      { name:'caregiving_ral_media',       value: String(parseInt(S.avgSalary)||0) },
      { name:'caregiving_pct_caregiver',   value: String(parseInt(S.pctCaregiver)||33) },
      { name:'caregiving_costo_stimato',   value: String(r.total) },
      { name:'caregiving_profilo_rischio', value: p.tag },
      { name:'caregiving_fonte',           value: window.location.search.includes('utm_medium=email')?'newsletter':'sito' }
    ],
    context: { pageUri: window.location.href, pageName: 'Assessment Caregiving — Epassi' },
    legalConsentOptions: { consent: {
      consentToProcess: true,
      text: 'Acconsento al trattamento dei dati per ricevere il report gratuito.',
      communications: [{ value:true, subscriptionTypeId:999, text:'Acconsento a ricevere comunicazioni di marketing da Epassi.' }]
    }}
  };

  try {
    const res = await fetch(
      `https://api.hsforms.com/submissions/v3/integration/submit/${HS_PORTAL_ID}/${HS_FORM_GUID}`,
      { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) }
    );
    if (res.ok) { S.step=4; render(); window.scrollTo({top:0,behavior:'smooth'}); }
    else {
      if (btn) { btn.disabled=false; btn.textContent='Invia →'; }
      showFormError('Si è verificato un errore. Riprova tra qualche secondo.');
    }
  } catch(e) {
    if (btn) { btn.disabled=false; btn.textContent='Invia →'; }
    showFormError('Connessione non disponibile. Controlla la rete e riprova.');
  }
}

function showFormError(msg) {
  let err = document.getElementById('form-error');
  if (!err) {
    err = document.createElement('p');
    err.id = 'form-error';
    err.style.cssText = 'font-size:13px;color:#FF9B6B;margin-top:8px;';
    const s = document.querySelector('.email-section');
    if (s) s.appendChild(err);
  }
  err.textContent = msg;
}

render();
</script>
